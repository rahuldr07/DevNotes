services:
  db:
    image: postgres:16-alpine
    container_name: devnotes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: devnotes
      POSTGRES_USER: devnotes
      POSTGRES_PASSWORD: devnotes
    ports:
      - "5432:5432"
    volumes:
      - devnotes_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devnotes -d devnotes"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  devnotes_postgres_data:
